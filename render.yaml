services:
  - type: web
    name: mamurbeksave
    runtime: python
    region: frankfurt
    plan: free
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
